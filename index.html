<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sơ Đồ Lớp Học 11/1 - Luxury Glass</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;800&display=swap');

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg, #0f172a, #1e293b, #000000, #08111f);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #f8fafc; margin: 0; padding: 30px; min-height: 100vh;
      text-align: center; overflow-x: hidden; position: relative;
    }

    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* --- MÀN HÌNH CHÀO & KHÓA --- */
    #welcome-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 15, 25, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 99999; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .welcome-text { color: #ffffff; font-size: 26px; font-weight: 600; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); transition: transform 0.3s ease; }
    .welcome-text:hover { transform: scale(1.1); }
    #main-wrapper { opacity: 1; transform: scale(0.92); }

    #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .lock-box { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    .lock-box h2 { color: #d4af37; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
    .lock-box input { padding: 12px; width: 200px; border-radius: 8px; border: 1px solid #d35400; background: #1e293b; color: white; text-align: center; font-size: 18px; margin-bottom: 20px; }
    .btn-enter { background: linear-gradient(135deg, #d35400, #e67e22); color: white; width: 100%; }

    h1 { margin-bottom: 50px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.7); }

    .top-area { display: flex; justify-content: flex-start; align-items: center; margin-bottom: 60px; padding: 0 70px; position: relative; }
    .teacher-zone { display: flex; flex-direction: column; align-items: center; }
    .blackboard { position: absolute; left: 50%; transform: translateX(-50%); background: rgba(26, 37, 47, 0.4); border: 5px solid rgba(142, 68, 173, 0.6); border-radius: 12px; backdrop-filter: blur(10px); width: 450px; height: 110px; display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; font-weight: bold; box-shadow: 0 0 25px rgba(142, 68, 173, 0.5); letter-spacing: 6px; }

    /* BỐ CỤC LỚP HỌC */
    .classroom-container { display: flex; justify-content: flex-start; gap: 50px; margin-top: 20px; overflow-x: auto; padding: 20px 40px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .classroom-container::-webkit-scrollbar { display: none; }
    .to-group { position: relative; flex-shrink: 0; }
    .to-group:not(:last-child)::after { content: ''; position: absolute; right: -30px; top: 50px; bottom: 0; width: 3px; background: linear-gradient(to bottom, transparent, rgba(149, 165, 166, 0.2), transparent); }
    .to-title { font-weight: 800; font-size: 24px; margin-bottom: 25px; color: #d35400; text-transform: uppercase; text-shadow: 0 0 5px rgba(211, 84, 0, 0.5); }
    .desk-grid { display: grid; grid-template-columns: repeat(2, 130px); gap: 25px; }

    /* --- BÀN HỌC & MÀU GIỚI TÍNH --- */
    .seat {
      width: 130px; height: 100px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center; overflow: hidden; backdrop-filter: blur(10px);
      border: 3px solid rgba(212, 175, 55, 0.3); /* Mặc định viền vàng */
      box-shadow: 0 8px 30px rgba(0,0,0,0.3); transition: all 0.3s ease;
    }

    /* Màu cho học sinh Nam (Xanh Dương) */
    .seat.male { border-color: rgba(0, 168, 255, 0.6); box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3); }
    .seat.male:hover { transform: scale(1.08) translateY(-5px); border-color: #00a8ff; box-shadow: 0 0 25px rgba(0, 168, 255, 0.8); z-index: 10; }

    /* Màu cho học sinh Nữ (Hồng) */
    .seat.female { border-color: rgba(255, 159, 243, 0.6); box-shadow: 0 4px 15px rgba(255, 159, 243, 0.3); }
    .seat.female:hover { transform: scale(1.08) translateY(-5px); border-color: #ff9ff3; box-shadow: 0 0 25px rgba(255, 159, 243, 0.8); z-index: 10; }

    /* Hover mặc định (chưa có giới tính) */
    .seat:hover { transform: scale(1.08) translateY(-5px); border-color: rgba(230, 126, 34, 0.8); box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); z-index: 10; }

    .seat img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    .seat span { position: relative; z-index: 2; padding: 5px 12px; color: white; background: rgba(0, 0, 0, 0.6); border-radius: 6px; font-size: 14px; font-weight: 600; text-shadow: 0 0 3px rgba(0,0,0,0.5); }
    .seat.empty span { color: rgba(127, 140, 141, 0.7); background: transparent; font-weight: 300; }
    #seat_teacher { width: 150px; height: 110px; border-color: rgba(192, 57, 43, 0.6); }

    /* MODAL CHUNG */
    .modal { display: none; position: fixed; z-index: 100000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); backdrop-filter: blur(8px); overflow-y: auto;}

    /* MODAL ADMIN */
    .modal-content { background: rgba(25, 35, 45, 0.95); border: 2px solid rgba(212, 175, 55, 0.4); border-radius: 15px; margin: 3% auto; padding: 25px; width: 380px; text-align: left; color: #f8fafc; }
    .modal-content label { font-weight: bold; margin-bottom: 5px; display: block; font-size: 14px; color: #cbd5e1;}
    .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 10px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; box-sizing: border-box; font-family: inherit;}
    .modal-content select option { background: #1e293b; color: white; } /* CSS cho bảng chọn giới tính */

    .btn-group { display: flex; gap: 10px; justify-content: space-between; margin-top: 5px; }
    button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; font-size: 14px;}
    button:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-save { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; flex-grow: 1; }
    .btn-cancel { background: rgba(149, 165, 166, 0.3); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-clear { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; width: 100%; margin-top: 10px;}

    /* MODAL PROFILE (XEM) */
    .view-content { background: rgba(30, 41, 59, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; margin: 5% auto; padding: 30px; width: 400px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); position: relative; backdrop-filter: blur(20px); }
    .profile-header { display: flex; align-items: center; justify-content: center; gap: 20px; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }

    .profile-header img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #00f2fe; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); transition: 0.3s; }

    .profile-info { text-align: left; }
    .profile-info h2 { color: #fff; margin: 0 0 5px 0; font-size: 24px; font-weight: 800; text-shadow: 0 0 10px rgba(255,255,255,0.3);}
    .profile-info p { color: #94a3b8; font-size: 14px; margin: 0 0 10px 0; max-width: 200px;}

    .social-icons { display: flex; gap: 12px; }
    .social-icons a { color: #fff; background: rgba(255, 255, 255, 0.1); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s; font-size: 16px; }
    .social-icons a:hover { transform: translateY(-3px); background: #4facfe; color: white; box-shadow: 0 5px 15px rgba(79,172,254,0.4); }

    .desc-box { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 16px; color: #e2e8f0; font-size: 15px; line-height: 1.6; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; text-align: left; }
    .music-player { background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 16px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
    .music-player .cd-spin { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
    .music-player .song-info { text-align: left; flex-grow: 1; }
    .music-player .song-info h4 { margin: 0; color: #fff; font-size: 15px; }
    .music-player .song-info p { margin: 2px 0 0 0; color: #94a3b8; font-size: 12px; }
    audio { height: 30px; width: 100%; margin-top: 8px; outline: none;}
    audio::-webkit-media-controls-panel { background-color: rgba(255,255,255,0.1); }
    audio::-webkit-media-controls-current-time-display, audio::-webkit-media-controls-time-remaining-display { color: white; }

    .btn-close-view { margin-top: 20px; background: rgba(255, 255, 255, 0.1); color: white; width: 100%; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;}
    .btn-close-view:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>

<div id="welcome-overlay">
  <div class="welcome-text">Click to View ツ</div>
</div>

<div id="main-wrapper">
  <div id="lock-screen">
    <div class="lock-box">
      <h2>🔑 Khu Vực Cơ Mật</h2>
      <p>Nhập <b>20242027</b> để xem..</p>
      <input type="password" id="passwordInput" placeholder="Mật mã...">
      <br>
      <button class="btn-enter" onclick="checkPassword()">Truy Cập</button>
    </div>
  </div>

  <h1>Sơ Đồ Lớp Học 11/1</h1>

  <div class="top-area">
    <div class="teacher-zone">
      <div class="to-title" style="color: #e74c3c; text-shadow: 0 0 5px rgba(231, 76, 60, 0.5);">Giáo Viên</div>
      <div class="seat empty" id="seat_teacher" onclick="handleSeatClick('seat_teacher')"></div>
    </div>
  </div>

  <div class="classroom-container" id="classroom"></div>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="color: #4facfe; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top:0;">Cập nhật Profile</h3>

    <label>Tên / Biệt danh:</label>
    <input type="text" id="inputName" placeholder="Ví dụ: TranToan ツ">

    <label>Giới tính (Để tạo màu viền):</label>
    <select id="inputGender">
      <option value="none">-- Chọn giới tính --</option>
      <option value="male">Nam ♂ (Viền Xanh)</option>
      <option value="female">Nữ ♀ (Viền Hồng)</option>
    </select>

    <label>Chức vụ / Caption ngắn:</label>
    <input type="text" id="inputSub" placeholder="Ví dụ: Lớp trưởng | Trùm game">

    <label>Mô tả chi tiết:</label>
    <textarea id="inputDesc" rows="2" placeholder="Sở thích, tính cách..."></textarea>

    <label><i class="fa-brands fa-facebook" style="color:#1877F2;"></i> Link Facebook:</label>
    <input type="text" id="inputFb" placeholder="https://facebook.com/...">

    <label><i class="fa-brands fa-tiktok" style="color:#fff;"></i> Link TikTok:</label>
    <input type="text" id="inputTikTok" placeholder="https://tiktok.com/@...">

    <label><i class="fa-solid fa-music" style="color:#ff4757;"></i> Link File Nhạc (MP3):</label>
    <input type="text" id="inputMusic" placeholder="Nhập link file .mp3 trực tiếp">

    <label>Chọn ảnh đại diện Avatar:</label>
    <input type="file" id="inputFile" accept="image/*" style="border: none; padding: 0; background: transparent;">

    <div class="btn-group">
      <button class="btn-cancel" onclick="closeModal()">Hủy</button>
      <button class="btn-save" onclick="saveData()">Lưu Lại</button>
    </div>
    <button class="btn-clear" onclick="clearSeat()">Xóa trống chỗ</button>
  </div>
</div>

<div id="viewModal" class="modal" onclick="closeViewModal()">
  <div class="view-content" onclick="event.stopPropagation()">
    <div class="profile-header">
      <img id="viewImg" src="" alt="Avatar">
      <div class="profile-info">
        <h2 id="viewName">TÊN CHƯA CẬP NHẬT</h2>
        <p id="viewSub">Học sinh lớp 11/1</p>
        <div class="social-icons">
          <a id="btnFb" href="#" target="_blank" style="display:none;"><i class="fa-brands fa-facebook-f"></i></a>
          <a id="btnTikTok" href="#" target="_blank" style="display:none;"><i class="fa-brands fa-tiktok"></i></a>
          <a href="#" onclick="alert('Đã copy link Profile!')"><i class="fa-solid fa-link"></i></a>
        </div>
      </div>
    </div>

    <div class="desc-box" id="viewDesc">Bạn này khá bí ẩn...</div>

    <div class="music-player" id="musicPlayerBox" style="display:none;">
      <img src="https://i.pinimg.com/736x/8b/6e/8f/8b6e8f498c368d18d45129b068b553e1.jpg" class="cd-spin" id="viewMusicCover">
      <div class="song-info">
        <h4>Đang phát nhạc ♫</h4>
        <audio id="viewAudio" controls controlsList="nodownload">
          <source id="viewAudioSrc" src="" type="audio/mpeg">
        </audio>
      </div>
    </div>

    <button class="btn-close-view" onclick="closeViewModal()">Đóng Profile</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  // HIỆU ỨNG ANIME.JS
  document.getElementById('welcome-overlay').addEventListener('click', function() {
    anime({ targets: '#welcome-overlay', opacity: 0, duration: 800, easing: 'easeInOutQuad', complete: () => this.style.display = 'none' });
    anime({ targets: '#main-wrapper', scale: 1, duration: 1200, easing: 'easeOutQuart' });
  });

  // LOGIC PHÂN QUYỀN
  window.isAdmin = false;
  window.checkPassword = () => {
    const pass = document.getElementById('passwordInput').value;
    if (pass === "toanmc") { window.isAdmin = true; alert("✅ Đăng nhập ADMIN thành công!"); document.getElementById('lock-screen').style.display = 'none'; }
    else if (pass === "20242027") { window.isAdmin = false; document.getElementById('lock-screen').style.display = 'none'; }
    else { alert("Sai mật mã rồi bạn ơi!"); }
  };
  document.getElementById("passwordInput").addEventListener("keyup", (e) => { if (e.key === "Enter") window.checkPassword(); });

  // FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyBZWr61_VzsZlP51U95kFsHfVTyJouC_BA",
    authDomain: "sodolophoc.firebaseapp.com",
    databaseURL: "https://sodolophoc-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sodolophoc",
    storageBucket: "sodolophoc.firebasestorage.app",
    messagingSenderId: "280835349484",
    appId: "1:280835349484:web:412dc0df07d0085fe0fec9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const classRef = ref(db, 'classroom_data');

  window.classData = {};
  window.currentEditingSeat = null;
  const toNames = ['Tổ 4', 'Tổ 3', 'Tổ 2', 'Tổ 1'];

  renderUI();

  onValue(classRef, (snapshot) => {
    window.classData = snapshot.val() || {};
    renderUI();
  });

  function renderUI() {
    const container = document.getElementById('classroom');
    container.innerHTML = '';
    updateSeatVisual(document.getElementById('seat_teacher'), 'seat_teacher');

    toNames.forEach((toName, toIndex) => {
      let toDiv = document.createElement('div');
      toDiv.className = 'to-group';
      toDiv.innerHTML = `<div class="to-title">${toName}</div>`;
      let gridDiv = document.createElement('div');
      gridDiv.className = 'desk-grid';
      let rows = 5;

      for (let i = 1; i <= rows * 2; i++) {
        let row = Math.ceil(i / 2);
        let col = (i % 2 === 1) ? 'cot1' : 'cot2';
        let seatId = `seat_${toIndex}_${row}_${col}`;

        let seatDiv = document.createElement('div');
        seatDiv.className = 'seat empty';
        seatDiv.id = seatId;
        seatDiv.onclick = () => window.handleSeatClick(seatId);

        updateSeatVisual(seatDiv, seatId);
        gridDiv.appendChild(seatDiv);
      }
      toDiv.appendChild(gridDiv);
      container.appendChild(toDiv);
    });
  }

  function updateSeatVisual(seatElement, seatId) {
    if (!seatElement) return;
    let data = window.classData[seatId];
    seatElement.innerHTML = '';

    if (data && data.name) {
      seatElement.className = 'seat'; // Reset class

      // ÁP DỤNG MÀU GIỚI TÍNH CHO GHẾ
      if (data.gender === 'male') seatElement.classList.add('male');
      else if (data.gender === 'female') seatElement.classList.add('female');

      if (data.img) seatElement.innerHTML += `<img src="${data.img}">`;
      seatElement.innerHTML += `<span>${data.name}</span>`;
    } else {
      seatElement.className = 'seat empty';
      seatElement.innerHTML += `<span>+ Trống</span>`;
    }
  }

  // XỬ LÝ CLICK BÀN
  window.handleSeatClick = (seatId) => {
    let data = window.classData[seatId];

    if (window.isAdmin) {
      window.openModal(seatId);
    } else {
      if (data && data.name) {
        document.getElementById('viewName').innerText = data.name;

        // ĐỔI MÀU TÊN THEO GIỚI TÍNH
        if (data.gender === 'male') document.getElementById('viewName').style.color = '#00a8ff';
        else if (data.gender === 'female') document.getElementById('viewName').style.color = '#ff9ff3';
        else document.getElementById('viewName').style.color = '#ffffff';

        document.getElementById('viewSub').innerText = data.sub || "Học sinh lớp 11/1";
        document.getElementById('viewDesc').innerText = data.desc || "Bạn này khá bí ẩn, chưa có thông tin gì...";

        // ĐỔI MÀU VIỀN AVATAR THEO GIỚI TÍNH
        let avatarImg = document.getElementById('viewImg');
        avatarImg.src = data.img || "https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png";
        if (data.gender === 'male') { avatarImg.style.borderColor = '#00a8ff'; avatarImg.style.boxShadow = '0 0 20px rgba(0, 168, 255, 0.4)'; }
        else if (data.gender === 'female') { avatarImg.style.borderColor = '#ff9ff3'; avatarImg.style.boxShadow = '0 0 20px rgba(255, 159, 243, 0.4)'; }
        else { avatarImg.style.borderColor = '#00f2fe'; avatarImg.style.boxShadow = '0 0 20px rgba(0, 242, 254, 0.4)'; }

        if (data.fb) { document.getElementById('btnFb').style.display = 'flex'; document.getElementById('btnFb').href = data.fb; } else { document.getElementById('btnFb').style.display = 'none'; }
        if (data.tiktok) { document.getElementById('btnTikTok').style.display = 'flex'; document.getElementById('btnTikTok').href = data.tiktok; } else { document.getElementById('btnTikTok').style.display = 'none'; }

        let audioPlayer = document.getElementById('viewAudio');
        if (data.music) {
          document.getElementById('musicPlayerBox').style.display = 'flex';
          document.getElementById('viewAudioSrc').src = data.music;
          document.getElementById('viewMusicCover').src = data.img || "https://i.pinimg.com/736x/8b/6e/8f/8b6e8f498c368d18d45129b068b553e1.jpg";
          audioPlayer.load();
        } else {
          document.getElementById('musicPlayerBox').style.display = 'none';
          audioPlayer.pause();
        }
        document.getElementById('viewModal').style.display = 'block';
      } else {
        alert("Chỗ này chưa có ai ngồi nha!");
      }
    }
  };

  // ADMIN: ĐỔI DỮ LIỆU
  window.openModal = (seatId) => {
    window.currentEditingSeat = seatId;
    let data = window.classData[seatId] || { name: '', sub: '', desc: '', fb: '', tiktok: '', music: '', gender: 'none', img: '' };

    document.getElementById('inputName').value = data.name;
    document.getElementById('inputGender').value = data.gender || 'none'; // Đọc giới tính
    document.getElementById('inputSub').value = data.sub || '';
    document.getElementById('inputDesc').value = data.desc || '';
    document.getElementById('inputFb').value = data.fb || '';
    document.getElementById('inputTikTok').value = data.tiktok || '';
    document.getElementById('inputMusic').value = data.music || '';
    document.getElementById('inputFile').value = '';

    document.getElementById('editModal').style.display = 'block';
  };

  window.closeModal = () => document.getElementById('editModal').style.display = 'none';
  window.closeViewModal = () => { document.getElementById('viewModal').style.display = 'none'; document.getElementById('viewAudio').pause(); };

  window.saveData = () => {
    let name = document.getElementById('inputName').value;
    let gender = document.getElementById('inputGender').value; // Lấy giới tính
    let sub = document.getElementById('inputSub').value;
    let desc = document.getElementById('inputDesc').value;
    let fb = document.getElementById('inputFb').value;
    let tiktok = document.getElementById('inputTikTok').value;
    let music = document.getElementById('inputMusic').value;
    let fileInput = document.getElementById('inputFile');

    if (!name) return alert("Vui lòng nhập tên!");

    let saveDataToFirebase = (imgBase64) => {
      // Lưu thêm trường gender vào database
      set(ref(db, 'classroom_data/' + window.currentEditingSeat), {
        name: name, gender: gender, sub: sub, desc: desc, fb: fb, tiktok: tiktok, music: music, img: imgBase64
      }).then(window.closeModal).catch((e) => alert("Lỗi mạng: " + e));
    };

    if (fileInput.files && fileInput.files[0]) {
      let reader = new FileReader();
      reader.onload = (e) => {
        let img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          let canvas = document.createElement('canvas');
          let scale = 200 / img.width;
          canvas.width = 200; canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          saveDataToFirebase(canvas.toDataURL('image/jpeg', 0.8));
        };
      };
      reader.readAsDataURL(fileInput.files[0]);
    } else {
      saveDataToFirebase(window.classData[window.currentEditingSeat]?.img || '');
    }
  };

  window.clearSeat = () => {
    if(confirm("Xóa trống chỗ này nhé?")) {
      remove(ref(db, 'classroom_data/' + window.currentEditingSeat)).then(window.closeModal);
    }
  };
</script>
</body>
</html>
