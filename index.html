<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sơ Đồ Lớp Học 11/1 - Luxury Glass</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    /* Phông chữ sang trọng */
    @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;800&display=swap');

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg, #0f172a, #1e293b, #000000, #111827);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #f8fafc;
      margin: 0;
      padding: 30px;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
      position: relative;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* --- MÀN HÌNH CHÀO KÍNH MỜ --- */
    #welcome-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(10, 15, 25, 0.6);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      z-index: 99999; display: flex; justify-content: center; align-items: center; cursor: pointer;
    }
    .welcome-text {
      color: #ffffff; font-size: 26px; font-weight: 600; letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); transition: transform 0.3s ease;
    }
    .welcome-text:hover { transform: scale(1.1); }

    /* --- Container chứa web --- */
    #main-wrapper { opacity: 1; transform: scale(0.92); }

    /* --- MÀN HÌNH KHÓA --- */
    #lock-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
      z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .lock-box {
      background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
      border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    .lock-box h2 { color: #d4af37; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
    .lock-box input {
      padding: 12px; width: 200px; border-radius: 8px; border: 1px solid #d35400;
      background: #1e293b; color: white; text-align: center; font-size: 18px; margin-bottom: 20px;
    }
    .btn-enter { background: linear-gradient(135deg, #d35400, #e67e22); color: white; width: 100%; }

    h1 { margin-bottom: 50px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.7); }

    .top-area { display: flex; justify-content: flex-start; align-items: center; margin-bottom: 60px; padding: 0 70px; position: relative; }
    .teacher-zone { display: flex; flex-direction: column; align-items: center; }

    .blackboard {
      position: absolute; left: 50%; transform: translateX(-50%);
      background: rgba(26, 37, 47, 0.4); border: 5px solid rgba(142, 68, 173, 0.6); border-radius: 12px;
      backdrop-filter: blur(10px); width: 450px; height: 110px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 26px; font-weight: bold; box-shadow: 0 0 25px rgba(142, 68, 173, 0.5); letter-spacing: 6px;
    }

    /* BỐ CỤC LỚP HỌC (Lướt ngang điện thoại) */
    .classroom-container {
      display: flex; justify-content: flex-start; gap: 50px; margin-top: 20px;
      overflow-x: auto; padding: 20px 40px; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .classroom-container::-webkit-scrollbar { display: none; }
    .to-group { position: relative; flex-shrink: 0; }
    .to-group:not(:last-child)::after {
      content: ''; position: absolute; right: -30px; top: 50px; bottom: 0; width: 3px;
      background: linear-gradient(to bottom, transparent, rgba(149, 165, 166, 0.2), transparent);
    }
    .to-title { font-weight: 800; font-size: 24px; margin-bottom: 25px; color: #d35400; text-transform: uppercase; text-shadow: 0 0 5px rgba(211, 84, 0, 0.5); }
    .desk-grid { display: grid; grid-template-columns: repeat(2, 130px); gap: 25px; }

    /* BÀN HỌC */
    .seat {
      width: 130px; height: 100px; background: rgba(255, 255, 255, 0.05); border: 3px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center;
      overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); transition: all 0.3s ease;
    }
    .seat:hover { transform: scale(1.08) translateY(-5px); border-color: rgba(230, 126, 34, 0.8); box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); z-index: 10; }
    .seat img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    .seat span { position: relative; z-index: 2; padding: 5px 12px; color: white; background: rgba(0, 0, 0, 0.6); border-radius: 6px; font-size: 14px; font-weight: 600; text-shadow: 0 0 3px rgba(0,0,0,0.5); }
    .seat.empty span { color: rgba(127, 140, 141, 0.7); background: transparent; font-weight: 300; }
    #seat_teacher { width: 150px; height: 110px; border-color: rgba(192, 57, 43, 0.6); }

    /* MODAL CHỈNH SỬA */
    .modal { display: none; position: fixed; z-index: 100000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
    .modal-content { background: rgba(25, 35, 45, 0.9); border: 3px solid rgba(212, 175, 55, 0.4); border-radius: 15px; margin: 5% auto; padding: 30px; width: 360px; text-align: left; color: #f8fafc; }
    .modal-content label { font-weight: bold; margin-bottom: 8px; display: block;}
    .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: white; box-sizing: border-box;}
    .btn-group { display: flex; gap: 15px; justify-content: space-between; margin-top: 10px; }
    button { padding: 12px 22px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; text-transform: uppercase; }
    button:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-save { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; flex-grow: 1; }
    .btn-cancel { background: rgba(149, 165, 166, 0.3); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-clear { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; width: 100%; margin-top: 15px;}
  </style>
</head>
<body>

<div id="welcome-overlay">
  <div class="welcome-text">Click to View ツ</div>
</div>

<div id="main-wrapper">
  <div id="lock-screen">
    <div class="lock-box">
      <h2>🔑 Khu Vực Cơ Mật</h2>
      <p>Vui lòng nhập mật mã của lớp để xem sơ đồ</p>
      <input type="password" id="passwordInput" placeholder="Nhập mk...">
      <br>
      <button class="btn-enter" onclick="checkPassword()">Truy Cập</button>
    </div>
  </div>

  <h1>Sơ Đồ Chỗ Ngồi Lớp Học 11/1</h1>

  <div class="top-area">
    <div class="teacher-zone">
      <div class="to-title" style="color: #e74c3c; text-shadow: 0 0 5px rgba(231, 76, 60, 0.5);">Giáo Viên</div>
      <div class="seat empty" id="seat_teacher" onclick="openModal('seat_teacher')"></div>
    </div>
    <div class="blackboard">BẢNG LỚP</div>
  </div>

  <div class="classroom-container" id="classroom"></div>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="color: #d35400; border-bottom: 2px solid rgba(212, 175, 55, 0.3); padding-bottom: 12px;">Chỉnh sửa</h3>
    <label>Tên / Biệt danh:</label>
    <input type="text" id="inputName" placeholder="Tên...">
    <label>Mô tả chi tiết:</label>
    <textarea id="inputDesc" rows="2" placeholder="Ví dụ: Lớp trưởng..."></textarea>
    <label>Chọn ảnh đại diện (Up ảnh dìm):</label>
    <input type="file" id="inputFile" accept="image/*" style="border: none; padding: 0;">
    <div class="btn-group">
      <button class="btn-cancel" onclick="closeModal()">Hủy</button>
      <button class="btn-save" onclick="saveData()">Lưu Lại</button>
    </div>
    <button class="btn-clear" onclick="clearSeat()">Xóa trống chỗ này</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  // HIỆU ỨNG ANIME.JS (Chạy màn hình chào)
  document.getElementById('welcome-overlay').addEventListener('click', function() {
    anime({ targets: '#welcome-overlay', opacity: 0, duration: 800, easing: 'easeInOutQuad', complete: () => this.style.display = 'none' });
    anime({ targets: '#main-wrapper', scale: 1, duration: 1200, easing: 'easeOutQuart' });
  });

  // LOGIC KHÓA MÀN HÌNH
  window.checkPassword = () => {
    if (document.getElementById('passwordInput').value === "20242027") {
      document.getElementById('lock-screen').style.display = 'none';
    } else { alert("Sai mật khẩu rồi Toan ơi!"); }
  };
  document.getElementById("passwordInput").addEventListener("keyup", (e) => { if (e.key === "Enter") window.checkPassword(); });

  // CẤU HÌNH FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyBZWr61_VzsZlP51U95kFsHfVTyJouC_BA",
    authDomain: "sodolophoc.firebaseapp.com",
    projectId: "sodolophoc",
    storageBucket: "sodolophoc.firebasestorage.app",
    messagingSenderId: "280835349484",
    appId: "1:280835349484:web:412dc0df07d0085fe0fec9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const classRef = ref(db, 'classroom_data');

  let classData = {};
  let currentEditingSeat = null;
  const toNames = ['Tổ 4', 'Tổ 3', 'Tổ 2', 'Tổ 1'];
  const classLayout = {
    'Tổ 4': { cot1: 5, cot2: 5 },
    'Tổ 3': { cot1: 5, cot2: 5 },
    'Tổ 2': { cot1: 5, cot2: 5 },
    'Tổ 1': { cot1: 5, cot2: 5 }
  };

  // LẮNG NGHE DỮ LIỆU TỪ FIREBASE ĐỂ CẬP NHẬT GIAO DIỆN ONLINE
  onValue(classRef, (snapshot) => {
    classData = snapshot.val() || {};
    renderUI();
  });

  function renderUI() {
    const container = document.getElementById('classroom');
    container.innerHTML = '';
    updateSeatVisual(document.getElementById('seat_teacher'), 'seat_teacher');

    toNames.forEach((toName, toIndex) => {
      let toDiv = document.createElement('div');
      toDiv.className = 'to-group';
      toDiv.innerHTML = `<div class="to-title">${toName}</div>`;

      let gridDiv = document.createElement('div');
      gridDiv.className = 'desk-grid';
      let rows = 5; // Tối đa 5 hàng (10 bàn mỗi tổ)

      for (let i = 1; i <= rows * 2; i++) {
        let row = Math.ceil(i / 2);
        let col = (i % 2 === 1) ? 'cot1' : 'cot2';

        let seatId = `seat_${toIndex}_${row}_${col}`;
        let seatDiv = document.createElement('div');
        seatDiv.className = 'seat empty';
        seatDiv.id = seatId;
        seatDiv.onclick = () => window.openModal(seatId);

        updateSeatVisual(seatDiv, seatId);
        gridDiv.appendChild(seatDiv);
      }
      toDiv.appendChild(gridDiv);
      container.appendChild(toDiv);
    });
  }

  function updateSeatVisual(seatElement, seatId) {
    if (!seatElement) return;
    let data = classData[seatId];
    seatElement.innerHTML = '';
    if (data && data.name) {
      seatElement.classList.remove('empty');
      if (data.img) seatElement.innerHTML += `<img src="${data.img}">`;
      seatElement.innerHTML += `<span>${data.name}</span>`;
    } else {
      seatElement.classList.add('empty');
      seatElement.innerHTML += `<span>+ Thêm</span>`;
    }
  }

  // CÁC HÀM XỬ LÝ NÚT BẤM
  window.openModal = (seatId) => {
    currentEditingSeat = seatId;
    let data = classData[seatId] || { name: '', desc: '', img: '' };
    document.getElementById('inputName').value = data.name;
    document.getElementById('inputDesc').value = data.desc;
    document.getElementById('editModal').style.display = 'block';
  };

  window.closeModal = () => document.getElementById('editModal').style.display = 'none';

  window.saveData = () => {
    let name = document.getElementById('inputName').value;
    let desc = document.getElementById('inputDesc').value;
    let fileInput = document.getElementById('inputFile');

    if (!name) return alert("Vui lòng nhập tên!");

    if (fileInput.files && fileInput.files[0]) {
      let reader = new FileReader();
      reader.onload = (e) => {
        let img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          let canvas = document.createElement('canvas');
          let scale = 180 / img.width; // Nén ảnh nhỏ gọn cho database
          canvas.width = 180;
          canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);

          set(ref(db, 'classroom_data/' + currentEditingSeat), {
            name: name, desc: desc, img: canvas.toDataURL('image/jpeg', 0.7)
          }).then(window.closeModal);
        };
      };
      reader.readAsDataURL(fileInput.files[0]);
    } else {
      set(ref(db, 'classroom_data/' + currentEditingSeat), {
        name: name, desc: desc, img: classData[currentEditingSeat]?.img || ''
      }).then(window.closeModal);
    }
  };

  window.clearSeat = () => {
    if(confirm("Xóa trống chỗ này nhé?")) {
      remove(ref(db, 'classroom_data/' + currentEditingSeat)).then(window.closeModal);
    }
  };
</script>
</body>
</html>
