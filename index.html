<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sơ Đồ Lớp Học - Luxury Glass Edition</title>
  <style>
    /* Phông chữ sang trọng */
    @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;800&display=swap');

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* NỀN ĐÃ SỬA: Gradient tối chuyển màu tự động, không dùng ảnh ngoài */
      background: linear-gradient(-45deg, #0f172a, #1e293b, #000000, #111827);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #f8fafc;
      margin: 0;
      padding: 30px;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Hiệu ứng chuyển nền mượt mà */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin-bottom: 50px;
      color: #ffffff;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.7);
    }

    /* ----- KHU VỰC PHÍA TRÊN ----- */
    .top-area {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 60px;
      padding: 0 70px;
      position: relative;
    }

    .teacher-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Bảng Đen (Glassmorphism + Neon) */
    .blackboard {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 37, 47, 0.4);
      border: 5px solid rgba(142, 68, 173, 0.6);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      width: 450px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 26px;
      font-weight: bold;
      box-shadow: 0 0 25px rgba(142, 68, 173, 0.5);
      letter-spacing: 6px;
    }

    /* ----- BỐ CỤC LỚP HỌC (4 TỔ) ----- */
    .classroom-container {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 20px;
    }

    .to-group {
      position: relative;
    }

    /* Vách ngăn mềm mại giữa các tổ */
    .to-group:not(:last-child)::after {
      content: '';
      position: absolute;
      right: -30px;
      top: 50px;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, transparent, rgba(149, 165, 166, 0.2), transparent);
    }

    .to-title {
      font-weight: 800;
      font-size: 24px;
      margin-bottom: 25px;
      color: #d35400;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 5px rgba(211, 84, 0, 0.5);
    }

    /* Lưới bàn ghế cho mỗi tổ */
    .desk-grid {
      display: grid;
      grid-template-columns: repeat(2, 130px);
      gap: 25px;
    }

    /* ----- THIẾT KẾ BÀN HỌC (GLASS + GOLD) ----- */
    .seat {
      width: 130px;
      height: 100px;
      background: rgba(255, 255, 255, 0.05);
      border: 3px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }

    .seat:hover {
      transform: scale(1.08) translateY(-5px);
      border-color: rgba(230, 126, 34, 0.8);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
      z-index: 10;
    }

    .seat img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 1;
      z-index: 1;
    }

    .seat span {
      position: relative;
      z-index: 2;
      padding: 5px 12px;
      color: white;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0.5px;
      text-shadow: 0 0 3px rgba(0,0,0,0.5);
    }

    .seat.empty span {
      color: rgba(127, 140, 141, 0.7);
      background-color: transparent;
      font-size: 14px;
      font-weight: 300;
    }

    /* Bàn Giáo Viên */
    #seat_teacher {
      width: 150px;
      height: 110px;
      border-color: rgba(192, 57, 43, 0.6);
    }

    #seat_teacher:hover {
      border-color: rgba(231, 76, 60, 1);
      box-shadow: 0 0 25px rgba(192, 57, 43, 0.7);
    }

    /* ------ BẢNG NHẬP THÔNG TIN (GLASS MODAL) ------ */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
    }

    .modal-content {
      background: rgba(25, 35, 45, 0.9);
      border: 3px solid rgba(212, 175, 55, 0.4);
      border-radius: 15px;
      backdrop-filter: blur(15px);
      margin: 8% auto;
      padding: 30px;
      width: 360px;
      text-align: left;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      color: #f8fafc;
    }

    .modal-content label { font-weight: bold; color: #fdfbfb; font-size: 16px; margin-bottom: 8px; display: block;}
    .modal-content input, .modal-content textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(212, 175, 55, 0.2);
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
      color: white;
      transition: 0.3s;
    }

    .modal-content input:focus, .modal-content textarea:focus {
      border-color: rgba(230, 126, 34, 0.8);
      outline: none;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    .btn-group { display: flex; gap: 15px; justify-content: space-between; margin-top: 10px; }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover { opacity: 0.9; transform: translateY(-2px); }

    .btn-save { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; flex-grow: 1; }
    .btn-cancel { background: rgba(149, 165, 166, 0.3); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-clear { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; width: 100%; margin-top: 15px;}

  </style>
</head>
<body>

<h1>Sơ Đồ Chỗ Ngồi Lớp Học</h1>

<div class="top-area">
  <div class="teacher-zone">
    <div class="to-title" style="color: #e74c3c; text-shadow: 0 0 5px rgba(231, 76, 60, 0.5);">Giáo Viên</div>
    <div class="seat empty" id="seat_teacher" onclick="openModal('seat_teacher')"></div>
  </div>
  <div class="blackboard">BẢNG LỚP</div>
</div>

<div class="classroom-container" id="classroom">
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-top: 0; color: #d35400; border-bottom: 2px solid rgba(212, 175, 55, 0.3); padding-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Chỉnh sửa chỗ ngồi</h3>

    <label>Tên / Biệt danh:</label>
    <input type="text" id="inputName" placeholder="Nhập tên chính xác...">

    <label>Mô tả chi tiết:</label>
    <textarea id="inputDesc" rows="2" placeholder="Ví dụ: Lớp trưởng, Trùm Minecraft..."></textarea>

    <label>Chọn ảnh đại diện (Up ảnh dìm):</label>
    <input type="file" id="inputFile" accept="image/*" style="border: none; padding: 0; color: #7f8c8d;">

    <div class="btn-group">
      <button class="btn-cancel" onclick="closeModal()">Hủy</button>
      <button class="btn-save" onclick="saveData()">Lưu Lại</button>
    </div>
    <button class="btn-clear" onclick="clearSeat()">Xóa trống chỗ này</button>
  </div>
</div>

<script>
  let classData = JSON.parse(localStorage.getItem('myClassData_v4')) || {};
  let currentEditingSeat = null;

  updateSeatVisual(document.getElementById('seat_teacher'), 'seat_teacher');

  const container = document.getElementById('classroom');
  const toNames = ['Tổ 4', 'Tổ 3', 'Tổ 2', 'Tổ 1'];

  const classLayout = {
    'Tổ 4': { cot1: 5, cot2: 5 },
    'Tổ 3': { cot1: 5, cot2: 5 },
    'Tổ 2': { cot1: 5, cot2: 5 },
    'Tổ 1': { cot1: 5, cot2: 5 }
  };

  toNames.forEach((toName, toIndex) => {
    let toDiv = document.createElement('div');
    toDiv.className = 'to-group';

    let title = document.createElement('div');
    title.className = 'to-title';
    title.innerText = toName;
    toDiv.appendChild(title);

    let gridDiv = document.createElement('div');
    gridDiv.className = 'desk-grid';

    let rows = Math.max(classLayout[toName].cot1, classLayout[toName].cot2);

    for (let i = 1; i <= rows * 2; i++) {
      let row = Math.ceil(i / 2);
      let col = (i % 2 === 1) ? 'cot1' : 'cot2';
      let currentColsCount = classLayout[toName][col];

      if (row > currentColsCount) {
        let emptyDiv = document.createElement('div');
        gridDiv.appendChild(emptyDiv);
        continue;
      }

      let seatId = `seat_${toIndex}_${row}_${col}`;
      let seatDiv = document.createElement('div');
      seatDiv.className = 'seat empty';
      seatDiv.id = seatId;
      seatDiv.onclick = () => openModal(seatId);

      updateSeatVisual(seatDiv, seatId);
      gridDiv.appendChild(seatDiv);
    }
    toDiv.appendChild(gridDiv);
    container.appendChild(toDiv);
  });

  function updateSeatVisual(seatElement, seatId) {
    if (!seatElement) return;
    let data = classData[seatId];
    seatElement.innerHTML = '';

    if (data && data.name) {
      seatElement.classList.remove('empty');
      if (data.img) {
        seatElement.innerHTML += `<img src="${data.img}">`;
      }
      seatElement.innerHTML += `<span>${data.name}</span>`;
    } else {
      seatElement.classList.add('empty');
      seatElement.innerHTML += `<span>+ Thêm</span>`;
    }
  }

  function openModal(seatId) {
    currentEditingSeat = seatId;
    let data = classData[seatId] || { name: '', desc: '', img: '' };

    document.getElementById('inputName').value = data.name;
    document.getElementById('inputDesc').value = data.desc;
    document.getElementById('inputFile').value = '';

    let modalTitle = document.getElementById('modalTitle');
    if(seatId === 'seat_teacher') {
      modalTitle.innerText = "Chỉnh sửa Bàn Giáo Viên";
    } else {
      let toIndex = parseInt(seatId.split('_')[1]);
      let rows = parseInt(seatId.split('_')[2]);
      let cols = (seatId.split('_')[3] === 'cot1') ? "Bên Trái" : "Bên Phải";
      modalTitle.innerText = `Chỉnh sửa: ${toNames[toIndex]} - Hàng ${rows} - ${cols}`;
    }

    document.getElementById('editModal').style.display = 'block';
  }

  function closeModal() {
    document.getElementById('editModal').style.display = 'none';
  }

  function saveData() {
    let name = document.getElementById('inputName').value;
    let desc = document.getElementById('inputDesc').value;
    let fileInput = document.getElementById('inputFile');

    if (!name) {
      alert("Vui lòng nhập tên!");
      return;
    }

    // --- THUẬT TOÁN TỰ ĐỘNG NÉN ẢNH ---
    if (fileInput.files && fileInput.files[0]) {
      let reader = new FileReader();
      reader.onload = function(e) {
        let img = new Image();
        img.src = e.target.result;

        img.onload = function() {
          let canvas = document.createElement('canvas');
          let ctx = canvas.getContext('2d');

          // Kích thước tối đa của ảnh sau khi nén (giúp siêu nhẹ)
          let MAX_WIDTH = 200;
          let MAX_HEIGHT = 200;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > MAX_WIDTH) {
              height *= MAX_WIDTH / width;
              width = MAX_WIDTH;
            }
          } else {
            if (height > MAX_HEIGHT) {
              width *= MAX_HEIGHT / height;
              height = MAX_HEIGHT;
            }
          }

          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);

          // Chuyển ảnh thành định dạng jpeg chất lượng 80%
          let compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);

          saveToStorage(name, desc, compressedDataUrl);
        }
      };
      reader.readAsDataURL(fileInput.files[0]);
    } else {
      let oldImg = classData[currentEditingSeat] ? classData[currentEditingSeat].img : '';
      saveToStorage(name, desc, oldImg);
    }
  }

  function saveToStorage(name, desc, img) {
    classData[currentEditingSeat] = { name: name, desc: desc, img: img };

    // Thêm cảnh báo nếu bộ nhớ vẫn đầy (phòng hờ)
    try {
      localStorage.setItem('myClassData_v4', JSON.stringify(classData));
      updateSeatVisual(document.getElementById(currentEditingSeat), currentEditingSeat);
      closeModal();
    } catch (e) {
      alert("⚠️ Bộ nhớ trình duyệt đã đầy! Vui lòng xóa bớt chỗ ngồi cũ để thêm mới.");
      console.error(e);
    }
  }

  function clearSeat() {
    delete classData[currentEditingSeat];
    localStorage.setItem('myClassData_v4', JSON.stringify(classData));
    updateSeatVisual(document.getElementById(currentEditingSeat), currentEditingSeat);
    closeModal();
  }
</script>
</body>
</html>
